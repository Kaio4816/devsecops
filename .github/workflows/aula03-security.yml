# ============================================
# WORKFLOW: Container Security
# ============================================
name: 🔒 Container Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write    

jobs:
  # ============================================
  # JOB: Lint Dockerfile com Hadolint
  # ============================================
  hadolint:
    name: 🔎 Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔎 Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: fiap-dclt-devsecops-aula04/Dockerfile.secure
          failure-threshold: warning
  # ============================================
  # JOB: Container Image Scan
  # ============================================
  trivy-image:
    name: 🐳 Image Scan
    runs-on: ubuntu-latest
    needs: [hadolint]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Build image
        run: |
          docker build --platform linux/amd64 -t app:${{ github.sha }} -f Dockerfile.secure .

      - name: 🔍 Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'app:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: 📤 Trivy SARIF Report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'image'
          image-ref: 'app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: 📤 Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'
